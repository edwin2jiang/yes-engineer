name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must exist in the repo, e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          # Tag push triggers don't fetch other refs by default. We need
          # the v1.0.0 tag ref itself on the runner so `gh release create
          # --verify-tag` and the publish step can resolve it.
          fetch-tags: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          # Allow workflow_dispatch to override the implicit tag ref.
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "ref=${GITHUB_REF_NAME}"  # placeholder, replaced below
            VERSION="${RUNNER_TEMP:-/tmp}/.wf-version"
            echo -n "${{ github.event.inputs.tag }}" > "${VERSION}"
            VERSION_VAL=$(cat "${VERSION}")
          else
            VERSION_VAL="${GITHUB_REF_NAME#v}"
          fi
          APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" app/Bundle/Info.plist)
          if [[ "${VERSION_VAL}" != "${APP_VERSION}" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${VERSION_VAL}) does not match app version ${APP_VERSION}."
            exit 1
          fi
          echo "version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test legacy Go CLI
        run: go test ./...

      - name: Test Swift package
        run: swift test --package-path app

      - name: Build universal app bundle
        working-directory: app
        env:
          BUILD_ARCHS: "arm64 x86_64"
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: ./Bundle/build-app.sh

      - name: Verify app signature
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 \
            "app/build/Yes Engineer.app"

      - name: Build distributable DMG
        working-directory: app
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: ./Bundle/build-dmg.sh

      - name: Build .app.zip archive
        working-directory: app
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="build/Yes-Engineer-${VERSION}.app.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            "build/Yes Engineer.app" "${ARCHIVE}"
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Verify DMG signature
        if: env.MACOS_CODESIGN_IDENTITY != ''
        run: |
          set -euo pipefail
          DMG="app/build/Yes-Engineer-${{ steps.version.outputs.version }}.dmg"
          codesign --verify --verbose=2 "${DMG}"

      # Notarization is wired but only runs when all required secrets are
      # present. Until Apple Developer credentials are configured in the
      # repo secrets, this step is skipped and users may need to remove the
      # com.apple.quarantine xattr manually (documented in README).
      - name: Notarize DMG
        if: env.MACOS_NOTARY_PROFILE != ''
        env:
          MACOS_NOTARY_PROFILE: ${{ secrets.MACOS_NOTARY_PROFILE }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG="app/build/Yes-Engineer-${{ steps.version.outputs.version }}.dmg"
          xcrun notarytool submit "${DMG}" \
            --keychain-profile "${MACOS_NOTARY_PROFILE}" \
            --team-id "${MACOS_NOTARY_TEAM_ID}" \
            --wait
          xcrun stapler staple "${DMG}"

      - name: Stage release artifacts
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ART_DIR="${RUNNER_TEMP}/artifacts"
          rm -rf "${ART_DIR}"
          mkdir -p "${ART_DIR}"

          cd app/build
          for f in \
            "Yes-Engineer-${VERSION}.app.zip" \
            "Yes-Engineer-${VERSION}.app.zip.sha256" \
            "Yes-Engineer-${VERSION}.dmg" \
            "Yes-Engineer-${VERSION}.dmg.sha256"
          do
            if [[ -f "${f}" ]]; then
              cp "${f}" "${ART_DIR}/"
            else
              echo "::warning::expected artifact missing: ${f}"
            fi
          done
          cd "${ART_DIR}"
          ls -la
          echo "artifacts_dir=${ART_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          ART_DIR: ${{ steps.stage.outputs.artifacts_dir }}
        shell: bash
        run: |
          set -euxo pipefail
          TAG="${{ github.ref_name }}"

          echo "==> TAG=${TAG}"
          echo "==> ART_DIR=${ART_DIR}"
          echo "==> listing ART_DIR:"
          ls -la "${ART_DIR}"

          # Build the upload list from the staged artifacts. Skip files
          # that were never produced (e.g. DMG build failure).
          shopt -s nullglob
          ARTIFACTS=(
            "${ART_DIR}/Yes-Engineer-${TAG#v}.app.zip"
            "${ART_DIR}/Yes-Engineer-${TAG#v}.app.zip.sha256"
            "${ART_DIR}/Yes-Engineer-${TAG#v}.dmg"
            "${ART_DIR}/Yes-Engineer-${TAG#v}.dmg.sha256"
          )
          shopt -u nullglob
          echo "==> ARTIFACTS array count: ${#ARTIFACTS[@]}"
          for a in "${ARTIFACTS[@]}"; do
            if [[ ! -f "${a}" ]]; then
              echo "::error::Staged artifact missing on disk: ${a}"
              exit 1
            fi
            echo "  - ${a}  ($(wc -c < "${a}") bytes)"
          done

          # Use the GitHub REST API directly instead of `gh release
          # create`. The `gh` CLI was observed to silently succeed (exit
          # 0, no error, run marked successful) while never actually
          # creating the Release on macos-14 runners. curl against the
          # REST API gives us explicit error reporting.
          API="https://api.github.com/repos/${{ github.repository }}"
          AUTH="Authorization: token ${GH_TOKEN}"
          CT="Content-Type: application/json"
          ACCEPT="Accept: application/vnd.github+json"

          # 1) Create the release.
          echo "==> POST ${API}/releases"
          CREATE_BODY=$(jq -n \
            --arg tag "${TAG}" \
            --arg name "Yes Engineer ${TAG}" \
            '{tag_name: $tag, name: $name, generate_release_notes: true}')
          CREATE_RESP=$(curl -sS -X POST \
            -H "${AUTH}" -H "${CT}" -H "${ACCEPT}" \
            -d "${CREATE_BODY}" \
            -w '\n__HTTP_STATUS__:%{http_code}' \
            "${API}/releases")
          CREATE_STATUS=$(echo "${CREATE_RESP}" | sed -n 's/^__HTTP_STATUS__://p')
          CREATE_BODY_OUT=$(echo "${CREATE_RESP}" | sed '$d')
          echo "==> status=${CREATE_STATUS}"
          if [[ "${CREATE_STATUS}" == "422" ]]; then
            # Release already exists (e.g. workflow_dispatch re-run). Fetch
            # its id and continue with the upload step.
            echo "==> release already exists, looking it up"
            GET_RESP=$(curl -sS -H "${AUTH}" -H "${ACCEPT}" \
              -w '\n__HTTP_STATUS__:%{http_code}' \
              "${API}/releases/tags/${TAG}")
            GET_STATUS=$(echo "${GET_RESP}" | sed -n 's/^__HTTP_STATUS__://p')
            GET_BODY=$(echo "${GET_RESP}" | sed '$d')
            if [[ "${GET_STATUS}" != "200" ]]; then
              echo "::error::could not fetch existing release (status=${GET_STATUS}):"
              echo "${GET_BODY}"
              exit 1
            fi
            RELEASE_ID=$(echo "${GET_BODY}" | jq -r '.id')
          elif [[ "${CREATE_STATUS}" == "201" ]]; then
            RELEASE_ID=$(echo "${CREATE_BODY_OUT}" | jq -r '.id')
            echo "==> created release id=${RELEASE_ID}"
          else
            echo "::error::create release failed (status=${CREATE_STATUS}):"
            echo "${CREATE_BODY_OUT}"
            exit 1
          fi

          # 2) Upload each artifact via the asset upload endpoint.
          for a in "${ARTIFACTS[@]}"; do
            NAME=$(basename "${a}")
            CT_HDR="Content-Type: application/octet-stream"
            echo "==> uploading ${NAME}"
            UP_STATUS=$(curl -sS -X POST \
              -H "${AUTH}" -H "${CT_HDR}" \
              --data-binary "@${a}" \
              -w '%{http_code}' -o /tmp/up.json \
              "${API}/releases/${RELEASE_ID}/assets?name=${NAME}")
            if [[ "${UP_STATUS}" != "201" ]]; then
              echo "::error::upload ${NAME} failed (status=${UP_STATUS}):"
              cat /tmp/up.json
              exit 1
            fi
            echo "  ok ($(jq -r .size /tmp/up.json) bytes)"
          done

          # 3) Upload the combined SHA256SUMS.txt.
          SUMS_FILE="${ART_DIR}/SHA256SUMS.txt"
          : > "${SUMS_FILE}"
          for a in "${ARTIFACTS[@]}"; do
            if [[ "${a}" == *.sha256 ]]; then continue; fi
            shasum -a 256 "${a}" >> "${SUMS_FILE}"
          done
          if [[ -s "${SUMS_FILE}" ]]; then
            echo "==> uploading SHA256SUMS.txt"
            UP_STATUS=$(curl -sS -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${SUMS_FILE}" \
              -w '%{http_code}' -o /tmp/up.json \
              "${API}/releases/${RELEASE_ID}/assets?name=SHA256SUMS.txt")
            if [[ "${UP_STATUS}" != "201" ]]; then
              echo "::error::upload SHA256SUMS.txt failed (status=${UP_STATUS}):"
              cat /tmp/up.json
              exit 1
            fi
          fi

          # Final sanity dump.
          echo "==> final release assets:"
          curl -sS -H "${AUTH}" -H "${ACCEPT}" \
            "${API}/releases/${RELEASE_ID}" \
            | jq -r '.assets[] | "  - \(.name)  (\(.size) bytes)"'
