name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (must exist in the repo, e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6
        with:
          # Tag push triggers don't fetch other refs by default. We need
          # the v1.0.0 tag ref itself on the runner so `gh release create
          # --verify-tag` and the publish step can resolve it.
          fetch-tags: true

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          # Allow workflow_dispatch to override the implicit tag ref.
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "ref=${GITHUB_REF_NAME}"  # placeholder, replaced below
            VERSION="${RUNNER_TEMP:-/tmp}/.wf-version"
            echo -n "${{ github.event.inputs.tag }}" > "${VERSION}"
            VERSION_VAL=$(cat "${VERSION}")
          else
            VERSION_VAL="${GITHUB_REF_NAME#v}"
          fi
          APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" app/Bundle/Info.plist)
          if [[ "${VERSION_VAL}" != "${APP_VERSION}" ]]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${VERSION_VAL}) does not match app version ${APP_VERSION}."
            exit 1
          fi
          echo "version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test legacy Go CLI
        run: go test ./...

      - name: Test Swift package
        run: swift test --package-path app

      - name: Build universal app bundle
        working-directory: app
        env:
          BUILD_ARCHS: "arm64 x86_64"
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: ./Bundle/build-app.sh

      - name: Verify app signature
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 \
            "app/build/Yes Engineer.app"

      - name: Build distributable DMG
        working-directory: app
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: ./Bundle/build-dmg.sh

      - name: Build .app.zip archive
        working-directory: app
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="build/Yes-Engineer-${VERSION}.app.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            "build/Yes Engineer.app" "${ARCHIVE}"
          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Verify DMG signature
        if: env.MACOS_CODESIGN_IDENTITY != ''
        run: |
          set -euo pipefail
          DMG="app/build/Yes-Engineer-${{ steps.version.outputs.version }}.dmg"
          codesign --verify --verbose=2 "${DMG}"

      # Notarization is wired but only runs when all required secrets are
      # present. Until Apple Developer credentials are configured in the
      # repo secrets, this step is skipped and users may need to remove the
      # com.apple.quarantine xattr manually (documented in README).
      - name: Notarize DMG
        if: env.MACOS_NOTARY_PROFILE != ''
        env:
          MACOS_NOTARY_PROFILE: ${{ secrets.MACOS_NOTARY_PROFILE }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG="app/build/Yes-Engineer-${{ steps.version.outputs.version }}.dmg"
          xcrun notarytool submit "${DMG}" \
            --keychain-profile "${MACOS_NOTARY_PROFILE}" \
            --team-id "${MACOS_NOTARY_TEAM_ID}" \
            --wait
          xcrun stapler staple "${DMG}"

      - name: Stage release artifacts
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ART_DIR="${RUNNER_TEMP}/artifacts"
          rm -rf "${ART_DIR}"
          mkdir -p "${ART_DIR}"

          cd app/build
          for f in \
            "Yes-Engineer-${VERSION}.app.zip" \
            "Yes-Engineer-${VERSION}.app.zip.sha256" \
            "Yes-Engineer-${VERSION}.dmg" \
            "Yes-Engineer-${VERSION}.dmg.sha256"
          do
            if [[ -f "${f}" ]]; then
              cp "${f}" "${ART_DIR}/"
            else
              echo "::warning::expected artifact missing: ${f}"
            fi
          done
          cd "${ART_DIR}"
          ls -la
          # Generate a combined SHA256SUMS.txt so the release ships with a
          # single checksum file users can verify against.
          : > SHA256SUMS.txt
          shopt -s nullglob
          for f in *.app.zip *.dmg; do
            shasum -a 256 "${f}" >> SHA256SUMS.txt
          done
          shopt -u nullglob
          ls -la
          echo "artifacts_dir=${ART_DIR}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.name;
            const artifactsDir = '${{ steps.stage.outputs.artifacts_dir }}';
            const path = require('path');
            const version = tag.replace(/^v/, '');
            const fileNames = [
              `Yes-Engineer-${version}.app.zip`,
              `Yes-Engineer-${version}.app.zip.sha256`,
              `Yes-Engineer-${version}.dmg`,
              `Yes-Engineer-${version}.dmg.sha256`,
              `SHA256SUMS.txt`,
            ];
            const paths = fileNames.map(n => `${artifactsDir}/${n}`);

            // Sanity: every file must exist on disk before we touch the
            // API. Fail loudly with the exact missing path so the next
            // person doesn't have to dig.
            const fs = require('fs');
            for (const p of paths) {
              if (!fs.existsSync(p)) {
                core.setFailed(`Staged artifact missing on disk: ${p}`);
                return;
              }
              core.info(`staged: ${p}  (${fs.statSync(p).size} bytes)`);
            }

            // Create or reuse the release.
            let release;
            try {
              release = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Yes Engineer ${tag}`,
                generate_release_notes: true,
              });
              core.info(`created release id=${release.data.id}`);
            } catch (err) {
              if (err.status === 422) {
                core.info('release already exists, fetching it');
                const got = await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: tag,
                });
                release = got;
              } else {
                throw err;
              }
            }

            // Upload each artifact as a release asset.
            for (const p of paths) {
              const name = path.posix.basename(p);
              const data = fs.readFileSync(p);
              const ct = 'application/octet-stream';
              core.info(`uploading ${name} (${data.length} bytes)`);
              const asset = await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: name,
                data: data,
                headers: { 'content-type': ct, 'content-length': data.length },
              });
              core.info(`  ok asset_id=${asset.data.id}`);
            }

            // Final dump for self-diagnosing.
            const final = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag,
            });
            for (const a of final.data.assets) {
              core.info(`attached: ${a.name}  (${a.size} bytes)`);
            }
