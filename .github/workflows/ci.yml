name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and verify
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test legacy Go CLI
        run: go test ./...

      - name: Test Swift package
        run: swift test --package-path app

      - name: Build Swift package
        run: swift build --package-path app --configuration release --arch arm64

      - name: Build app bundle
        working-directory: app
        run: ./Bundle/build-app.sh

      - name: Verify app signature
        run: codesign --verify --deep --strict "app/build/Yes Engineer.app"
